Builds:
  - versionName: 2.1.1
    versionCode: 6
    commit: v2.1.1
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y rustup cmake build-essential clang libclang-dev
      - apt-get install -y protobuf-compiler libprotobuf-dev
    gradle:
      - yes
    prebuild:
      - export PROTOC=/usr/bin/protoc
      - cd ../.. && ./scripts/setup-libsignal.sh
      - cd ThirdParty/libsignal
      - rustup target add aarch64-linux-android armv7-linux-androideabi
      - ./java/build_jni.sh android-arm64 android-arm
    scanignore:
      - ThirdParty/libsignal/java/android/src/main/jniLibs
    scandelete:
      - ThirdParty/ObjectivePGP
      - ThirdParty/libsignal/target
      - ThirdParty/libsignal/rust
    ndk: 26.1.10909125

