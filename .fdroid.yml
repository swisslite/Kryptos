Builds:
  - versionName: 2.1.1
    versionCode: 6
    commit: v2.1.1
    subdir: android/app
    ndk: 26.1.10909125
    sudo:
      - apt-get update
      - apt-get install -y protobuf-compiler
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain none
    scandelete:
      - ThirdParty/ObjectivePGP
    prebuild:
      - . "$HOME/.cargo/env"
      - export CARGO_HOME="$HOME/.cargo" SOURCE_DATE_EPOCH=$(git -C ../.. log -1 --pretty=%ct)
      - cd ../.. && ./scripts/setup-libsignal.sh --android
    gradle:
      - yes

